name = "wowpay"
main = "src/index.ts"
compatibility_date = "2025-09-05"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "wowpay-db"
database_id = "b54588b9-b255-4c94-9a94-525aa4e54e43"

# 静态资源（HTML 页面等）
[assets]
directory = "./public"

# 非敏感环境变量
[vars]
BASE_URL = "https://wowpay.cursor02.workers.dev"
API_BASE_URL = "https://api.你的支付fm域名.com"
MERCHANT_NUM = "你的商户号"
PAY_TYPE = "alipay"

# 敏感变量请在 Dashboard 设置，或在本地执行:
# npx wrangler secret put SECRET_KEY
