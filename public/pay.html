<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>充值支付</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    h1 { font-size: 24px; margin-bottom: 24px; text-align: center; color: #333; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #555; font-size: 14px; }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #1677ff; }
    .amount-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .amount-btn {
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
    }
    .amount-btn:hover, .amount-btn.active {
      border-color: #1677ff;
      color: #1677ff;
      background: #e6f4ff;
    }
    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: #1677ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button[type="submit"]:hover { background: #0958d9; }
  </style>
</head>
<body>
  <div class="container">
    <h1>额度充值</h1>
    <form id="payForm">
      <div class="form-group">
        <label>用户ID</label>
        <input type="text" id="userId" placeholder="请输入用户ID" required>
      </div>
      <div class="form-group">
        <label>充值金额（元）</label>
        <div class="amount-options">
          <button type="button" class="amount-btn" data-amount="10">10元</button>
          <button type="button" class="amount-btn" data-amount="50">50元</button>
          <button type="button" class="amount-btn" data-amount="100">100元</button>
          <button type="button" class="amount-btn" data-amount="200">200元</button>
          <button type="button" class="amount-btn" data-amount="500">500元</button>
          <button type="button" class="amount-btn" data-amount="1000">1000元</button>
        </div>
        <input type="number" id="amount" placeholder="自定义金额" min="1" step="0.01" required>
      </div>
      <button type="submit">立即支付</button>
    </form>
  </div>

  <script>
    const amountBtns = document.querySelectorAll('.amount-btn');
    const amountInput = document.getElementById('amount');
    const userIdInput = document.getElementById('userId');

    // 从 URL 读取平台A传递的参数
    const params = new URLSearchParams(window.location.search);
    const urlUserId = params.get('user_id');
    const urlAmount = params.get('amount');

    // 模式二：同时传了 user_id 和 amount，直接跳转到收银台
    if (urlUserId && urlAmount) {
      document.body.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100vh;color:#888;">正在跳转支付...</div>';
      window.location.href = `/api/pay?user_id=${encodeURIComponent(urlUserId)}&amount=${urlAmount}`;
    }

    // 模式一：只传了 user_id，显示充值页面让用户选金额
    if (urlUserId) {
      userIdInput.value = urlUserId;
      userIdInput.readOnly = true;
    }

    amountBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        amountBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        amountInput.value = btn.dataset.amount;
      });
    });

    document.getElementById('payForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const userId = userIdInput.value.trim();
      const amount = amountInput.value;
      if (!userId || !amount) return;
      window.location.href = `/api/pay?user_id=${encodeURIComponent(userId)}&amount=${amount}`;
    });
  </script>
</body>
</html>
